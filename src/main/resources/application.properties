spring.application.name=NetOpsSynchro

server.port=5600

# ===============================
# DB
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/netops_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=SpringBootHikariCP-NETOPS
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

jwt.secret=YOUR_64_BYTE_SECRET_KEY_HERE_CHANGE_IT_NOW_12345678901234567890
jwt.expiration=86400000

encryption.secret.key=netops-secret-key-2025

